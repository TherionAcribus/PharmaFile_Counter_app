name: ci

on:
  push:
  pull_request:

jobs:
  deps-and-tests:
    name: audit des dépendances + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Bibliothèques système requises par les greffons Qt de PySide6 en mode
      # « offscreen » (les tests tournent sans affichage).
      - name: Dépendances système Qt (offscreen)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Installer les dépendances (runtime + tests)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      # Vérifie que toute dépendance tierce importée par le client est déclarée
      # et qu'aucun paquet serveur ne s'est glissé dans les fichiers de deps.
      - name: Audit des dépendances déclarées
        run: python tools/check_dependencies.py

      # Garde-fou accessibilité (point 28) : aucun skin ne doit repasser sous le
      # contraste AA sur le texte actif.
      - name: Audit du contraste des skins
        run: python tools/check_contrast.py

      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest -q
